<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main blue-to-purple gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="45%"  stop-color="#4f8bff"/>
      <stop offset="100%" stop-color="#9b3fff"/>
    </linearGradient>

    <!-- Slightly lighter for inner stroke highlights -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7eeeff"/>
      <stop offset="50%"  stop-color="#80b3ff"/>
      <stop offset="100%" stop-color="#c87dff"/>
    </linearGradient>

    <!-- Neon glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer bloom -->
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Bloom / halo layer (drawn first, under everything) ── -->
  <g filter="url(#bloom)" opacity="0.45">
    <!-- Outer P stroke – widest -->
    <path d="
      M 148 88
      L 148 424
      Q 148 440 164 440
      Q 180 440 180 424
      L 180 340
      L 300 340
      Q 390 340 420 280
      Q 444 228 420 172
      Q 394 108 300 88 Z
      M 180 120
      L 295 120
      Q 368 120 390 170
      Q 408 212 390 254
      Q 368 300 295 308
      L 180 308 Z
    " fill="none" stroke="#3a7fff" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Outer stroke (thickest, darkest) ── -->
  <g filter="url(#glow)">
    <path d="
      M 148 88
      L 148 424
      Q 148 440 164 440
      Q 180 440 180 424
      L 180 340
      L 300 340
      Q 390 340 420 280
      Q 444 228 420 172
      Q 394 108 300 88 Z
      M 180 120
      L 295 120
      Q 368 120 390 170
      Q 408 212 390 254
      Q 368 300 295 308
      L 180 308 Z
    " fill="none" stroke="url(#g1)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- ── Mid stroke ── -->
  <path d="
    M 148 88
    L 148 424
    Q 148 440 164 440
    Q 180 440 180 424
    L 180 340
    L 300 340
    Q 390 340 420 280
    Q 444 228 420 172
    Q 394 108 300 88 Z
    M 180 120
    L 295 120
    Q 368 120 390 170
    Q 408 212 390 254
    Q 368 300 295 308
    L 180 308 Z
  " fill="none" stroke="url(#g1)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Inner stroke ── -->
  <path d="
    M 148 88
    L 148 424
    Q 148 440 164 440
    Q 180 440 180 424
    L 180 340
    L 300 340
    Q 390 340 420 280
    Q 444 228 420 172
    Q 394 108 300 88 Z
    M 180 120
    L 295 120
    Q 368 120 390 170
    Q 408 212 390 254
    Q 368 300 295 308
    L 180 308 Z
  " fill="none" stroke="url(#g2)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- ── Innermost bright highlight ── -->
  <path d="
    M 148 88
    L 148 424
    Q 148 440 164 440
    Q 180 440 180 424
    L 180 340
    L 300 340
    Q 390 340 420 280
    Q 444 228 420 172
    Q 394 108 300 88 Z
    M 180 120
    L 295 120
    Q 368 120 390 170
    Q 408 212 390 254
    Q 368 300 295 308
    L 180 308 Z
  " fill="none" stroke="#d0f0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- ── Decorative horizontal lines (top wing detail) ── -->
  <g opacity="0.55" stroke="url(#g2)" stroke-linecap="round">
    <line x1="190" y1="102" x2="310" y2="102" stroke-width="5"/>
    <line x1="200" y1="113" x2="318" y2="113" stroke-width="3"/>
  </g>

  <!-- ── Tail flowing lines (bottom of the P's leg) ── -->
  <g opacity="0.5" stroke="url(#g1)" stroke-linecap="round">
    <path d="M 148 390 Q 130 430 110 445" fill="none" stroke-width="6"/>
    <path d="M 148 400 Q 126 438 104 456" fill="none" stroke-width="4"/>
  </g>
</svg>
